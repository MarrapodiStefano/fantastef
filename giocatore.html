<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giocatore - FantaStef</title>

<style>

/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
overflow:hidden;
}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
background:url("stadium-bg.png") center center / cover no-repeat;
color:white;
}

/* ================= WRAPPER ================= */

.main-wrapper{
max-width:1750px;
margin:auto;
height:100dvh;

padding:90px 20px 90px 20px;

display:flex;
justify-content:center;
align-items:center;
}

/* ================= HEADER ================= */

.header{
position:fixed;
top:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:1750px;
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
background:rgba(10,20,35,0.9);
backdrop-filter:blur(6px);
z-index:1000;
border-bottom:1px solid #2ecc71;
}

.logo-area{
display:flex;
align-items:center;
gap:12px;
font-size:24px;
font-weight:600;
}

.logo-area img{
width:42px;
height:42px;
border-radius:50%;
}

/* ================= BOTTOM MENU ================= */

.bottom-menu{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:1750px;
height:65px;
background:rgba(10,20,35,0.95);
backdrop-filter:blur(6px);
display:flex;
justify-content:space-around;
align-items:center;
z-index:1000;
}

.bottom-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
color:#2ecc71;
opacity:0.5;
}

.bottom-item.active{
opacity:1;
transform:translateY(-3px);
}

.bottom-item svg{
width:22px;
height:22px;
stroke:#2ecc71;
stroke-width:2;
fill:none;
margin-bottom:4px;
}

/* ================= PLAYER OVERLAY ================= */

.player-overlay{

width:90%;
max-width:420px;

margin:auto;

background:rgba(10,20,35,0.75);
backdrop-filter:blur(10px);

border-radius:26px;

padding:25px;

box-shadow:0 0 30px rgba(0,0,0,0.6);

}

.player-name{

font-size:26px;
font-weight:700;

}

.player-team{

opacity:0.7;
font-size:15px;

}

.player-layout{
display:flex;
flex-direction:column;
gap:16px;
}

.player-top{
display:flex;
gap:12px;
}

.player-image{
flex:2;
height:190px;
background:rgba(0,0,0,0.35);
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
opacity:0.7;
}

.player-stats-right{
flex:1;
display:flex;
flex-direction:column;
gap:12px;
}

.player-stats-middle{
display:flex;
gap:12px;
}

.stat-box{
flex:1;
background:rgba(0,0,0,0.45);
box-shadow:0 0 15px rgba(0,0,0,0.5) inset;
border-radius:14px;
padding:14px;
text-align:center;
font-size:14px;
letter-spacing:0.5px;
}

.player-radar{

height:200px;
background:rgba(0,0,0,0.35);
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
padding:15px;

}

.player-radar canvas{

width:100% !important;
max-width:240px;
height:auto !important;

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<div>←</div>

<div class="logo-area">
<img src="logo.png">
FantaStef
</div>

<div>⚙</div>

</div>

<!-- WRAPPER -->

<div class="main-wrapper">

<div class="player-overlay">

<div class="player-layout">

<div class="player-top">

<div class="player-image">
Foto
</div>

<div class="player-stats-right">

<div class="stat-box">Voto</div>
<div class="stat-box">Gol</div>
<div class="stat-box">Assist</div>

</div>

</div>

<div class="player-stats-middle">

<div class="stat-box">Amm</div>
<div class="stat-box">Esp</div>
<div class="stat-box">FM</div>

</div>

<div class="player-radar">

<canvas id="radarChart"></canvas>

</div>

</div>

</div>

<!-- BOTTOM MENU -->

<div class="bottom-menu">

<div class="bottom-item">
<svg viewBox="0 0 24 24"><path d="M3 10L12 3l9 7v10H3z"/></svg>
Home
</div>

<div class="bottom-item active">
<svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-8M22 20V6"/></svg>
Comparatore
</div>

<div class="bottom-item">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="5" r="1.5"/>
<circle cx="7" cy="10" r="1.5"/>
<circle cx="12" cy="10" r="1.5"/>
<circle cx="17" cy="10" r="1.5"/>
<circle cx="6" cy="16" r="1.5"/>
<circle cx="12" cy="16" r="1.5"/>
<circle cx="18" cy="16" r="1.5"/>
</svg>
FantaXI
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>

const ctx = document.getElementById('radarChart');

new Chart(ctx, {
type: 'radar',

data: {

labels: [
'Tiri',
'Bonus',
'Forma',
'Assist',
'Expected'
],

datasets: [{

data: [7,8,6,7,7],

backgroundColor:'rgba(46,204,113,0.2)',

borderColor:'#2ecc71',

borderWidth:2,

pointBackgroundColor:'#2ecc71'

}]

},

options:{

maintainAspectRatio:false,

scales:{

r:{

angleLines:{
color:'rgba(255,255,255,0.1)'
},

grid:{
color:'rgba(255,255,255,0.1)'
},

pointLabels:{
color:'rgba(255,255,255,0.7)',
font:{
size:10
}
},

ticks:{
display:false
},

suggestedMin:0,
suggestedMax:10

}

}

}

});

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giocatore - FantaStef</title>

<style>

/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
overflow:hidden;
}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
background:url("stadium-bg.png") center center / cover no-repeat;
color:white;
}

/* ================= WRAPPER ================= */

.main-wrapper{
max-width:1750px;
margin:auto;
height:100dvh;
padding:100px 20px 90px 20px;
display:flex;
justify-content:center;
align-items:center;
}

/* ================= HEADER ================= */

.header{
position:fixed;
top:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:1750px;
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
background:rgba(10,20,35,0.9);
backdrop-filter:blur(6px);
z-index:1000;
border-bottom:1px solid #2ecc71;
}

.logo-area{
display:flex;
align-items:center;
gap:12px;
font-size:24px;
font-weight:600;
}

.logo-area img{
width:42px;
height:42px;
border-radius:50%;
}

/* ================= PLAYER CARD ================= */

.player-card{

width:420px;
max-width:90vw;

background:rgba(10,20,35,0.75);
backdrop-filter:blur(10px);

border-radius:26px;

padding:28px 24px;

text-align:center;

box-shadow:0 0 30px rgba(0,0,0,0.6);

}

/* sagoma */

.player-silhouette{

width:140px;
height:140px;

margin:auto;

border-radius:50%;

background:linear-gradient(
180deg,
rgba(255,255,255,0.05),
rgba(0,0,0,0.8)
);

box-shadow:
inset 0 0 40px rgba(0,0,0,0.8),
0 0 20px rgba(0,0,0,0.6);

margin-bottom:20px;

}

/* nome */

.player-name{

font-size:30px;
font-weight:700;

margin-bottom:6px;

}

/* squadra */

.player-team{

opacity:0.75;

margin-bottom:20px;

}

/* voto algoritmo */

.vote-box{

background:rgba(0,0,0,0.4);

border-radius:16px;

padding:14px;

margin-bottom:18px;

}

.vote-title{

font-size:12px;
opacity:0.7;
letter-spacing:1px;

}

.vote-value{

font-size:36px;
font-weight:700;
color:#2ecc71;

margin-top:6px;

}

/* stats grid */

.stats-grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:12px;

margin-top:10px;

}

.stat{

background:rgba(0,0,0,0.4);

border-radius:12px;

padding:14px;

}

.stat-value{

font-size:22px;
font-weight:700;

}

.stat-label{

font-size:11px;
opacity:0.6;

}

/* ================= BOTTOM MENU ================= */

.bottom-menu{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:1750px;
height:65px;
background:rgba(10,20,35,0.95);
backdrop-filter:blur(6px);
display:flex;
justify-content:space-around;
align-items:center;
z-index:1000;
}

.bottom-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
color:#2ecc71;
opacity:0.5;
}

.bottom-item.active{
opacity:1;
transform:translateY(-3px);
}

.bottom-item svg{
width:22px;
height:22px;
stroke:#2ecc71;
stroke-width:2;
fill:none;
margin-bottom:4px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<div>←</div>

<div class="logo-area">
<img src="logo.png">
FantaStef
</div>

<div>⚙</div>

</div>

</div>

</body>
</html>

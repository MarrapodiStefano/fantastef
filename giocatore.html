<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giocatore - FantaStef</title>

<style>

/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
overflow:hidden;
}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
background:url("stadium-bg.png") center center / cover no-repeat;
color:white;
}

/* ================= WRAPPER ================= */

.main-wrapper{

max-width:1750px;
margin:auto;

min-height:100svh;

padding:75px 20px 120px 20px;

display:flex;
justify-content:center;
align-items:flex-start;

}

/* ================= HEADER ================= */

.header{
position:fixed;
top:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:1750px;
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
background:rgba(10,20,35,0.9);
backdrop-filter:blur(6px);
z-index:1000;
border-bottom:1px solid #2ecc71;
}

.logo-area{
display:flex;
align-items:center;
gap:12px;
font-size:24px;
font-weight:600;
}

.logo-area img{
width:42px;
height:42px;
border-radius:50%;
}

/* ================= BOTTOM MENU ================= */

.bottom-menu{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:1750px;
height:65px;
background:rgba(10,20,35,0.95);
backdrop-filter:blur(6px);
display:flex;
justify-content:space-around;
align-items:center;
z-index:1000;
}

.bottom-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
color:#2ecc71;
opacity:0.5;
}

.bottom-item.active{
opacity:1;
transform:translateY(-3px);
}

.bottom-item svg{
width:22px;
height:22px;
stroke:#2ecc71;
stroke-width:2;
fill:none;
margin-bottom:4px;
}

/* ================= PLAYER OVERLAY ================= */

.player-overlay{

width:90%;
max-width:420px;

margin:-14px auto 0 auto;

background:rgba(10,20,35,0.45);

backdrop-filter:blur(14px);

border-radius:26px;

padding:25px;

box-shadow:0 0 30px rgba(0,0,0,0.6);

}
/* ---------- PLAYER SCORE STATES ---------- */

.player-overlay.red{

border:1px solid rgba(255,80,80,0.7);

box-shadow:
0 0 20px rgba(255,80,80,0.25);

}

.player-overlay.orange{

border:1px solid rgba(255,165,0,0.7);

box-shadow:
0 0 20px rgba(255,165,0,0.25);

}

.player-overlay.green{

border:1px solid rgba(46,204,113,0.7);

box-shadow:
0 0 25px rgba(46,204,113,0.35),
0 0 60px rgba(46,204,113,0.15);

}

.player-overlay.green-strong{

border:1px solid rgba(46,204,113,0.9);

box-shadow:
0 0 30px rgba(46,204,113,0.6),
0 0 80px rgba(46,204,113,0.35);

}

.player-overlay.glow{

box-shadow:
0 0 25px rgba(46,204,113,0.35),
0 0 60px rgba(46,204,113,0.15);

border:1px solid rgba(46,204,113,0.6);

}

.player-name{

font-size:26px;
font-weight:700;

}

.player-team{

opacity:0.7;
font-size:15px;

}

.player-layout{
display:flex;
flex-direction:column;
gap:16px;
}

.player-bar{

display:flex;
justify-content:space-between;
align-items:center;

gap:10px;

}

.player-info{

display:flex;
flex-direction:column;

}

.player-name{

font-size:22px;
font-weight:700;
letter-spacing:1px;

}

.player-meta{

font-size:12px;
opacity:0.7;

}

.player-search input{

height:34px;

border-radius:10px;
border:none;

background:rgba(0,0,0,0.35);

color:white;

padding:0 10px;

font-size:12px;

outline:none;

}

.player-top{
display:flex;
gap:12px;
}

.player-image{

flex:2;

height:210px;

background:linear-gradient(
180deg,
rgba(20,30,45,0.9),
rgba(5,10,18,0.95)
);

border-radius:18px;

box-shadow:
0 8px 30px rgba(0,0,0,0.6),
inset 0 0 40px rgba(0,0,0,0.7);

display:flex;
align-items:center;
justify-content:center;

font-size:14px;
color:rgba(255,255,255,0.6);

}

.player-image img{
width:100%;
height:100%;
object-fit:contain;
}

.player-stats-right{
flex:1;
display:flex;
flex-direction:column;
gap:12px;
}

.player-stats-middle{
display:flex;
gap:12px;
}

.stat-box{

flex:1;

height:62px;

background:rgba(0,0,0,0.45);

box-shadow:
inset 0 0 12px rgba(0,0,0,0.6),
0 0 6px rgba(46,204,113,0.05);

border-radius:14px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

}

.stat-label{

font-size:11px;
opacity:0.6;
letter-spacing:1px;

}

.stat-value{
font-size:20px;
font-weight:700;
margin-top:4px;
}

.player-radar{

height:150px;
padding:6px;

background:rgba(0,0,0,0.35);

border-radius:18px;

display:flex;
align-items:center;
justify-content:center;

padding:10px;

}

.player-radar canvas{
width:100% !important;
max-width:250px;
height:100% !important;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<div>←</div>

<div class="logo-area">
<img src="logo.png">
FantaStef
</div>

<div>⚙</div>

</div>

<!-- WRAPPER -->

<div class="main-wrapper">

<div class="player-overlay">

<div class="player-layout">

<div class="player-bar">

<div class="player-info">

<div class="player-name" id="player-name"></div>

<div class="player-meta">
<span id="player-team"></span> • 
<span id="player-role"></span>
</div>

</div>

<div class="player-search">

<input type="text" placeholder="Cerca giocatore">

</div>

</div>

<div class="player-top">

<div class="player-image">
<img id="player-photo">
</div>

<div class="player-stats-right">

<div class="stat-box">
<div class="stat-label">VOTO</div>
<div class="stat-value" id="stat-voto"></div>
</div>

<div class="stat-box">
<div class="stat-label">GOL</div>
<div class="stat-value" id="stat-gol"></div>
</div>

<div class="stat-box">
<div class="stat-label">ASSIST</div>
<div class="stat-value" id="stat-assist"></div>
</div>

</div>

</div>

<div class="player-stats-middle">

<div class="stat-box">
<div class="stat-label">AMM</div>
<div class="stat-value" id="stat-amm"></div>
</div>

<div class="stat-box">
<div class="stat-label">ESP</div>
<div class="stat-value" id="stat-esp"></div>
</div>

<div class="stat-box">
<div class="stat-label">FM</div>
<div class="stat-value" id="stat-fm"></div>
</div>

</div>

<div class="player-radar">

<canvas id="radarChart"></canvas>

</div>

</div>

</div>

<!-- BOTTOM MENU -->

<div class="bottom-menu">

<div class="bottom-item">
<svg viewBox="0 0 24 24"><path d="M3 10L12 3l9 7v10H3z"/></svg>
Home
</div>

<div class="bottom-item active">
<svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-8M22 20V6"/></svg>
Comparatore
</div>

<div class="bottom-item">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="5" r="1.5"/>
<circle cx="7" cy="10" r="1.5"/>
<circle cx="12" cy="10" r="1.5"/>
<circle cx="17" cy="10" r="1.5"/>
<circle cx="6" cy="16" r="1.5"/>
<circle cx="12" cy="16" r="1.5"/>
<circle cx="18" cy="16" r="1.5"/>
</svg>
FantaXI
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>

/* ================= PRENDI ID DAL LINK ================= */

const params = new URLSearchParams(window.location.search);
const playerId = parseInt(params.get("id"));

const ctx = document.getElementById('radarChart');

/* ================= CARICA JSON ================= */

fetch("giocatori_master.json")
.then(response => response.json())
.then(data => {

let tuttiGiocatori = [
...data.attaccanti,
...data.centrocampisti,
...data.difensori,
...data.portieri
];

const player = tuttiGiocatori.find(p => p.id === playerId);

if(!player) return;

document.getElementById("player-name").textContent = player.nome;
document.getElementById("player-team").textContent = player.squadra;

const ruoloMap = {
P:"POR",
D:"DIF",
C:"CEN",
A:"ATT"
};

document.getElementById("player-role").textContent = ruoloMap[player.ruolo];

const img = document.getElementById("player-photo");
img.src = "player-img/" + player.nome.toLowerCase() + ".PNG";
img.onerror = () => {
img.src = "player-img/" + player.nome.toLowerCase() + ".png";
};

/* ================= POPOLA STATISTICHE ================= */

document.getElementById("stat-voto").textContent = player.voto_algoritmo;
document.getElementById("stat-gol").textContent = player.gol;
document.getElementById("stat-assist").textContent = player.assist;
document.getElementById("stat-amm").textContent = player.ammonizioni;
document.getElementById("stat-esp").textContent = player.espulsioni;
document.getElementById("stat-fm").textContent = player.fantamedia;

/* ================= COLORI OVERLAY ================= */

const voto = player.voto_algoritmo;
document.getElementById("stat-voto").textContent = voto.toFixed(1);
let coloreRadar;
let coloreBg;

if(voto < 6){

coloreRadar = "#ff5050";
coloreBg = "rgba(255,80,80,0.2)";

document.querySelectorAll(".stat-value").forEach(el=>{
el.style.color="#ff5050";
});

}

else if(voto >= 6 && voto < 7){

coloreRadar = "#ffa500";
coloreBg = "rgba(255,165,0,0.2)";

document.querySelectorAll(".stat-value").forEach(el=>{
el.style.color="#ffa500";
});

}

else{

coloreRadar = "#2ecc71";
coloreBg = "rgba(46,204,113,0.2)";

}
const overlay = document.querySelector(".player-overlay");

if(voto < 6){

overlay.classList.add("red");

}

else if(voto >= 6 && voto < 7){

overlay.classList.add("orange");

}

else if(voto > 8){

overlay.classList.add("green-strong");

}

else if(voto > 7){

overlay.classList.add("green");

}

const radarData = [

player.avversario * 2,
player.motivazioni * 2,
player.status * 10,
player.score_penalita * 10,
player.score_rendimento

];

/* ================= RADAR ================= */

new Chart(ctx.getContext('2d'), {
type: 'radar',

data: {

labels:[
'Avversario',
'Motivazioni',
'Titolarità',
'Expected Malus',
'Expected Bonus'
],

datasets: [{

data: radarData,

backgroundColor: coloreBg,
borderColor: coloreRadar,
pointBackgroundColor: coloreRadar,
borderWidth:2

}]

},

options:{

maintainAspectRatio:false,

plugins:{
legend:{
display:false
}
},

scales:{
r:{
angleLines:{color:'rgba(255,255,255,0.1)'},
grid:{color:'rgba(255,255,255,0.1)'},
pointLabels:{
color:'rgba(255,255,255,0.7)',
font:{size:10}
},
ticks:{display:false},
min:0,
max:10
}
}

}

});

});

</script>
</body>
</html>

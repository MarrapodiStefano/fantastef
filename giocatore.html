<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giocatore - FantaStef</title>

<style>

/* ================= RESET ================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
overflow:hidden;
}

body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
background:url("stadium-bg.png") center center / cover no-repeat;
color:white;
}

/* ================= WRAPPER ================= */

.main-wrapper{
max-width:1750px;
margin:auto;
height:100dvh;
padding:130px 20px 100px 20px;
display:flex;
justify-content:center;
align-items:center;
}

/* ================= HEADER ================= */

.header{
position:fixed;
top:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:1750px;
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
background:rgba(10,20,35,0.9);
backdrop-filter:blur(6px);
z-index:1000;
border-bottom:1px solid #2ecc71;
}

.logo-area{
display:flex;
align-items:center;
gap:12px;
font-size:24px;
font-weight:600;
}

.logo-area img{
width:42px;
height:42px;
border-radius:50%;
}

/* ================= PLAYER CARD ================= */

.player-card{

width:420px;
max-width:90vw;

background:rgba(10,20,35,0.75);
backdrop-filter:blur(10px);

border-radius:26px;

padding:28px 24px;

text-align:center;

box-shadow:0 0 30px rgba(0,0,0,0.6);

margin-bottom:40px;

}

/* sagoma */

.player-silhouette{

width:110px;
height:110px;

margin:auto;

border-radius:50%;

background:linear-gradient(
180deg,
rgba(255,255,255,0.05),
rgba(0,0,0,0.8)
);

box-shadow:
inset 0 0 40px rgba(0,0,0,0.8),
0 0 20px rgba(0,0,0,0.6);

margin-bottom:20px;

}

/* nome */

.player-name{

font-size:26px;
font-weight:700;

margin-bottom:4px;

}

/* squadra */

.player-team{

opacity:0.75;

margin-bottom:10px;

}

/* ================= BOTTOM MENU ================= */

.bottom-menu{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:1750px;
height:65px;
background:rgba(10,20,35,0.95);
backdrop-filter:blur(6px);
display:flex;
justify-content:space-around;
align-items:center;
z-index:1000;
}

.bottom-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
color:#2ecc71;
opacity:0.5;
}

.bottom-item.active{
opacity:1;
transform:translateY(-3px);
}

.bottom-item svg{
width:22px;
height:22px;
stroke:#2ecc71;
stroke-width:2;
fill:none;
margin-bottom:4px;
}

/* ================= PLAYER OVERLAY ================= */

.player-overlay{

width:90%;
max-width:420px;

margin:auto;

background:rgba(10,20,35,0.75);
backdrop-filter:blur(10px);

border-radius:26px;

padding:25px;

box-shadow:0 0 30px rgba(0,0,0,0.6);

}

.player-header{

text-align:center;
margin-bottom:20px;

}

.player-avatar{

width:110px;
height:110px;

margin:auto;
margin-bottom:10px;

border-radius:50%;

background:radial-gradient(circle,#111,#000);

}

.player-name{

font-size:26px;
font-weight:700;

}

.player-team{

opacity:0.7;
font-size:15px;

}

.player-main{

display:grid;

grid-template-columns:120px 1fr;

align-items:center;

gap:20px;

margin:25px 0;

}

.vote-box{

background:rgba(0,0,0,0.4);

border-radius:16px;

padding:12px;

text-align:center;

width:120px;

margin:auto;

}
.vote-label{

font-size:11px;
opacity:0.7;
letter-spacing:1px;
text-align:center;

}

.vote-value{

font-size:30px;
color:#2ecc71;
font-weight:700;

}

.radar-box{

width:100%;
height:140px;

background:rgba(0,0,0,0.35);

border-radius:16px;

display:flex;
align-items:center;
justify-content:center;

}

.radar-box canvas{

width:100%;
height:100%;

}

.player-analysis{

margin:20px 0;

}

.risk-box{

color:#ff7675;
font-weight:600;

margin-bottom:10px;

}

.motivazioni{

font-size:14px;
opacity:0.8;

}

.season-stats{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:12px;

margin-top:10px;

}

.stat{

background:rgba(0,0,0,0.4);

border-radius:12px;

padding:10px;

text-align:center;

}

.stat-value{

font-size:18px;
font-weight:700;

}

.stat-label{

font-size:12px;
opacity:0.7;

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<div>←</div>

<div class="logo-area">
<img src="logo.png">
FantaStef
</div>

<div>⚙</div>

</div>

<!-- WRAPPER -->

<div class="main-wrapper">

Inter • Centrocampista
</div>

</div>


<div class="player-main">

</div>

</div>

</div>

<div>+ Buona forma recente</div>

<div>▲ Freccia verde in crescita</div>

<div>− Avversario ostico</div>

</div>

</div>


<div class="season-stats">

<div class="stat">
<div class="stat-value">8</div>
<div class="stat-label">Gol</div>
</div>

<div class="stat">
<div class="stat-value">5</div>
<div class="stat-label">Assist</div>
</div>

<div class="stat">
<div class="stat-value">7</div>
<div class="stat-label">Gialli</div>
</div>

<div class="stat">
<div class="stat-value">1</div>
<div class="stat-label">Rossi</div>
</div>

<div class="stat">
<div class="stat-value">27</div>
<div class="stat-label">Presenze</div>
</div>

<div class="stat">
<div class="stat-value">6.82</div>
<div class="stat-label">Media</div>
</div>

</div>

</div>

<!-- BOTTOM MENU -->

<div class="bottom-menu">

<div class="bottom-item">
<svg viewBox="0 0 24 24"><path d="M3 10L12 3l9 7v10H3z"/></svg>
Home
</div>

<div class="bottom-item active">
<svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-8M22 20V6"/></svg>
Comparatore
</div>

<div class="bottom-item">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="5" r="1.5"/>
<circle cx="7" cy="10" r="1.5"/>
<circle cx="12" cy="10" r="1.5"/>
<circle cx="17" cy="10" r="1.5"/>
<circle cx="6" cy="16" r="1.5"/>
<circle cx="12" cy="16" r="1.5"/>
<circle cx="18" cy="16" r="1.5"/>
</svg>
FantaXI
</div>

</div>

</body>
</html>
